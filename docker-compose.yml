version: "3.9"

services:
  api:
    build: .
    container_name: churn-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
    command: python run_pipeline.py --generate-data --clean --train --evaluate --save-model && uvicorn src.api.run:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    build: .
    container_name: churn-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
    depends_on:
      api:
        condition: service_healthy
    command: streamlit run app/dashboard.py --server.port 8501 --server.address 0.0.0.0

  training:
    build: .
    container_name: churn-training
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
    command: python run_pipeline.py --all
    profiles:
      - training
